<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈嫣然 - 个人学习展示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
--bg-primary: #0d1117;
--bg-secondary: #161b22;
--bg-card: #1c2128;
--bg-card-hover: #24292f;
--text-primary: #ffffff;
--text-secondary: #a0aec0;
--text-muted: #6b7280;
--accent-blue: #3498db;
--accent-cyan: #00d4ff;
--accent-purple: #9b59b6;
--accent-green: #2ecc71;
--accent-orange: #e67e22;
--border-color: #30363d;
--gradient-start: #1a1a2e;
--gradient-end: #16213e;
--glow-blue: rgba(52, 152, 219, 0.3);
--glow-cyan: rgba(0, 212, 255, 0.3);
}
 
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
 
body {
font-family: 'Noto Sans SC', sans-serif;
background: linear-gradient(135deg, var(--bg-primary) 0%, var(--gradient-start) 50%, var(--gradient-end) 100%);
color: var(--text-primary);
min-height: 100vh;
line-height: 1.6;
}
 
.noise-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
opacity: 0.03;
z-index: 1000;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}
 
.nav {
position: fixed;
top: 0;
left: 0;
right: 0;
height: 70px;
background: rgba(13, 17, 23, 0.8);
backdrop-filter: blur(20px);
border-bottom: 1px solid var(--border-color);
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 60px;
z-index: 100;
}
 
.nav-logo {
font-size: 1.5rem;
font-weight: 700;
background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
cursor: pointer;
}
 
.nav-links {
display: flex;
gap: 30px;
}
 
.nav-link {
color: var(--text-secondary);
text-decoration: none;
font-weight: 500;
transition: all 0.3s ease;
position: relative;
}
 
.nav-link:hover {
color: var(--accent-cyan);
}
 
.nav-link::after {
content: '';
position: absolute;
bottom: -5px;
left: 0;
width: 0;
height: 2px;
background: var(--accent-cyan);
transition: width 0.3s ease;
}
 
.nav-link:hover::after {
width: 100%;
}
 
.main {
padding-top: 70px;
min-height: 100vh;
}
 
.hero {
padding: 100px 60px;
display: flex;
align-items: center;
gap: 80px;
max-width: 1400px;
margin: 0 auto;
}
 
.hero-avatar {
width: 280px;
height: 280px;
border-radius: 50%;
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
padding: 4px;
flex-shrink: 0;
animation: float 6s ease-in-out infinite;
}
 
.hero-avatar-inner {
width: 100%;
height: 100%;
border-radius: 50%;
background: var(--bg-secondary);
display: flex;
align-items: center;
justify-content: center;
font-size: 6rem;
color: var(--accent-cyan);
}
 
@keyframes float {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-20px); }
}
 
.hero-content {
flex: 1;
}
 
.hero-greeting {
font-size: 1.1rem;
color: var(--accent-cyan);
font-weight: 500;
margin-bottom: 10px;
letter-spacing: 2px;
}
 
.hero-name {
font-size: 3.5rem;
font-weight: 700;
margin-bottom: 20px;
background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
 
.hero-info {
color: var(--text-secondary);
font-size: 1.1rem;
margin-bottom: 30px;
line-height: 2;
}
 
.hero-info span {
color: var(--accent-blue);
}
 
.hero-tags {
display: flex;
flex-wrap: wrap;
gap: 12px;
}
 
.hero-tag {
padding: 8px 20px;
background: rgba(52, 152, 219, 0.1);
border: 1px solid rgba(52, 152, 219, 0.3);
border-radius: 50px;
font-size: 0.9rem;
color: var(--accent-blue);
transition: all 0.3s ease;
}
 
.hero-tag:hover {
background: rgba(52, 152, 219, 0.2);
transform: translateY(-2px);
box-shadow: 0 5px 20px var(--glow-blue);
}
 
.section-title {
padding: 0 60px;
margin-bottom: 40px;
}
 
.section-title h2 {
font-size: 2rem;
font-weight: 700;
position: relative;
display: inline-block;
}
 
.section-title h2::after {
content: '';
position: absolute;
bottom: -10px;
left: 0;
width: 60px;
height: 4px;
background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
border-radius: 2px;
}
 
.course-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
gap: 30px;
padding: 0 60px 100px;
max-width: 1400px;
margin: 0 auto;
}
 
.course-card {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: 16px;
padding: 30px;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
position: relative;
overflow: hidden;
}
 
.course-card::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 4px;
background: linear-gradient(90deg, var(--card-color, var(--accent-blue)), transparent);
opacity: 0;
transition: opacity 0.3s ease;
}
 
.course-card:hover::before {
opacity: 1;
}
 
.course-card:hover {
transform: translateY(-10px);
border-color: var(--card-color, var(--accent-blue));
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px var(--card-glow, var(--glow-blue));
}
 
.course-card-icon {
width: 60px;
height: 60px;
border-radius: 12px;
background: linear-gradient(135deg, var(--card-color, var(--accent-blue)), var(--card-color2, var(--accent-purple)));
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 20px;
}
 
.course-card-icon i {
width: 30px;
height: 30px;
color: white;
}
 
.course-card h3 {
font-size: 1.4rem;
font-weight: 600;
margin-bottom: 12px;
color: var(--text-primary);
}
 
.course-card p {
color: var(--text-secondary);
font-size: 0.95rem;
margin-bottom: 20px;
line-height: 1.7;
}
 
.course-card-meta {
display: flex;
justify-content: space-between;
align-items: center;
color: var(--text-muted);
font-size: 0.85rem;
}
 
.course-card-meta span {
display: flex;
align-items: center;
gap: 6px;
}
 
.course-detail {
display: none;
max-width: 1200px;
margin: 0 auto;
padding: 60px;
}
 
.course-detail.active {
display: block;
animation: fadeIn 0.5s ease;
}
 
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
 
.back-btn {
display: inline-flex;
align-items: center;
gap: 8px;
color: var(--accent-cyan);
text-decoration: none;
font-weight: 500;
margin-bottom: 40px;
cursor: pointer;
transition: all 0.3s ease;
}
 
.back-btn:hover {
transform: translateX(-5px);
}
 
.course-header {
display: flex;
align-items: center;
gap: 30px;
margin-bottom: 60px;
padding-bottom: 40px;
border-bottom: 1px solid var(--border-color);
}
 
.course-header-icon {
width: 100px;
height: 100px;
border-radius: 20px;
background: linear-gradient(135deg, var(--card-color, var(--accent-blue)), var(--card-color2, var(--accent-purple)));
display: flex;
align-items: center;
justify-content: center;
}
 
.course-header-icon i {
width: 50px;
height: 50px;
color: white;
}
 
.course-header h1 {
font-size: 2.5rem;
font-weight: 700;
margin-bottom: 10px;
}
 
.course-header p {
color: var(--text-secondary);
font-size: 1.1rem;
}
 
.chapter-list {
display: flex;
flex-direction: column;
gap: 20px;
}
 
.chapter-item {
background: var(--bg-card);
border: 1px solid var(--border-color);
border-radius: 12px;
overflow: hidden;
transition: all 0.3s ease;
}
 
.chapter-item:hover {
border-color: var(--accent-blue);
}
 
.chapter-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 25px 30px;
cursor: pointer;
transition: background 0.3s ease;
}
 
.chapter-header:hover {
background: var(--bg-card-hover);
}
 
.chapter-header-left {
display: flex;
align-items: center;
gap: 20px;
}
 
.chapter-number {
width: 45px;
height: 45px;
border-radius: 10px;
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
font-size: 1.1rem;
}
 
.chapter-title {
font-size: 1.2rem;
font-weight: 600;
}
 
.chapter-arrow {
color: var(--text-muted);
transition: transform 0.3s ease;
}
 
.chapter-item.expanded .chapter-arrow {
transform: rotate(180deg);
}
 
.chapter-content {
display: none;
padding: 0 30px 30px;
border-top: 1px solid var(--border-color);
}
 
.chapter-item.expanded .chapter-content {
display: block;
animation: slideDown 0.3s ease;
}
 
@keyframes slideDown {
from { opacity: 0; max-height: 0; }
to { opacity: 1; max-height: 2000px; }
}
 
.knowledge-section {
margin-top: 30px;
}
 
.knowledge-section h4 {
font-size: 1.1rem;
color: var(--accent-cyan);
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 10px;
}
 
.knowledge-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 15px;
}
 
.knowledge-point {
background: var(--bg-secondary);
padding: 15px 20px;
border-radius: 8px;
border-left: 3px solid var(--accent-blue);
font-size: 0.95rem;
color: var(--text-secondary);
transition: all 0.3s ease;
}
 
.knowledge-point:hover {
background: var(--bg-card-hover);
transform: translateX(5px);
color: var(--text-primary);
}
 
.exercise-section {
margin-top: 40px;
background: var(--bg-secondary);
border-radius: 12px;
padding: 30px;
}
 
.exercise-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 30px;
}
 
.exercise-header h4 {
font-size: 1.2rem;
display: flex;
align-items: center;
gap: 10px;
}
 
.start-exercise-btn {
padding: 12px 30px;
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
border: none;
border-radius: 8px;
color: white;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}
 
.start-exercise-btn:hover {
transform: scale(1.05);
box-shadow: 0 10px 30px var(--glow-blue);
}
 
.quiz-section {
display: none;
}
 
.quiz-section.active {
display: block;
}
 
.quiz-progress {
display: flex;
align-items: center;
gap: 15px;
margin-bottom: 30px;
}
 
.quiz-progress-bar {
flex: 1;
height: 8px;
background: var(--bg-card);
border-radius: 4px;
overflow: hidden;
}
 
.quiz-progress-fill {
height: 100%;
background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
transition: width 0.3s ease;
}
 
.quiz-progress-text {
color: var(--text-secondary);
font-size: 0.9rem;
min-width: 60px;
}
 
.quiz-question {
background: var(--bg-card);
border-radius: 12px;
padding: 30px;
margin-bottom: 20px;
}
 
.quiz-question-type {
display: inline-block;
padding: 4px 12px;
background: rgba(52, 152, 219, 0.2);
color: var(--accent-blue);
border-radius: 4px;
font-size: 0.8rem;
margin-bottom: 15px;
}
 
.quiz-question-text {
font-size: 1.2rem;
font-weight: 500;
margin-bottom: 25px;
line-height: 1.8;
}
 
.quiz-options {
display: flex;
flex-direction: column;
gap: 12px;
}
 
.quiz-option {
display: flex;
align-items: center;
gap: 15px;
padding: 15px 20px;
background: var(--bg-secondary);
border: 2px solid var(--border-color);
border-radius: 10px;
cursor: pointer;
transition: all 0.3s ease;
}
 
.quiz-option:hover {
border-color: var(--accent-blue);
background: var(--bg-card-hover);
}
 
.quiz-option.selected {
border-color: var(--accent-cyan);
background: rgba(0, 212, 255, 0.1);
}
 
.quiz-option.correct {
border-color: var(--accent-green);
background: rgba(46, 204, 113, 0.1);
}
 
.quiz-option.incorrect {
border-color: #e74c3c;
background: rgba(231, 76, 60, 0.1);
}
 
.quiz-option-marker {
width: 30px;
height: 30px;
border-radius: 50%;
border: 2px solid var(--border-color);
display: flex;
align-items: center;
justify-content: center;
font-weight: 600;
flex-shrink: 0;
transition: all 0.3s ease;
}
 
.quiz-option.selected .quiz-option-marker {
border-color: var(--accent-cyan);
background: var(--accent-cyan);
color: var(--bg-primary);
}
 
.quiz-option.correct .quiz-option-marker {
border-color: var(--accent-green);
background: var(--accent-green);
color: white;
}
 
.quiz-option.incorrect .quiz-option-marker {
border-color: #e74c3c;
background: #e74c3c;
color: white;
}
 
.quiz-input {
width: 100%;
padding: 15px 20px;
background: var(--bg-secondary);
border: 2px solid var(--border-color);
border-radius: 10px;
color: var(--text-primary);
font-size: 1rem;
font-family: inherit;
transition: border-color 0.3s ease;
}
 
.quiz-input:focus {
outline: none;
border-color: var(--accent-blue);
}
 
.quiz-nav {
display: flex;
justify-content: space-between;
margin-top: 30px;
}
 
.quiz-nav-btn {
padding: 12px 30px;
border: none;
border-radius: 8px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}
 
.quiz-prev-btn {
background: var(--bg-card);
color: var(--text-secondary);
border: 1px solid var(--border-color);
}
 
.quiz-prev-btn:hover {
background: var(--bg-card-hover);
}
 
.quiz-next-btn {
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
color: white;
}
 
.quiz-next-btn:hover {
transform: scale(1.05);
box-shadow: 0 10px 30px var(--glow-blue);
}
 
.quiz-submit-btn {
background: linear-gradient(135deg, var(--accent-green), #27ae60);
color: white;
}
 
.quiz-submit-btn:hover {
transform: scale(1.05);
box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
}
 
.result-modal {
display: none;
position: fixed;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: rgba(0, 0, 0, 0.8);
backdrop-filter: blur(10px);
z-index: 200;
align-items: center;
justify-content: center;
}
 
.result-modal.active {
display: flex;
}
 
.result-content {
background: var(--bg-card);
border-radius: 20px;
padding: 50px;
text-align: center;
max-width: 500px;
width: 90%;
animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
 
@keyframes scaleIn {
from { opacity: 0; transform: scale(0.8); }
to { opacity: 1; transform: scale(1); }
}
 
.result-icon {
width: 100px;
height: 100px;
border-radius: 50%;
margin: 0 auto 30px;
display: flex;
align-items: center;
justify-content: center;
font-size: 3rem;
}
 
.result-icon.excellent {
background: linear-gradient(135deg, var(--accent-green), #27ae60);
}
 
.result-icon.good {
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
}
 
.result-icon.pass {
background: linear-gradient(135deg, var(--accent-orange), #f39c12);
}
 
.result-title {
font-size: 2rem;
font-weight: 700;
margin-bottom: 10px;
}
 
.result-score {
font-size: 3.5rem;
font-weight: 700;
margin: 20px 0;
}
 
.result-score span {
font-size: 1.5rem;
color: var(--text-secondary);
}
 
.result-detail {
color: var(--text-secondary);
margin-bottom: 30px;
}
 
.result-actions {
display: flex;
gap: 15px;
justify-content: center;
}
 
.result-btn {
padding: 12px 30px;
border: none;
border-radius: 8px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}
 
.result-retry-btn {
background: var(--bg-secondary);
color: var(--text-primary);
border: 1px solid var(--border-color);
}
 
.result-retry-btn:hover {
background: var(--bg-card-hover);
}
 
.result-close-btn {
background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
color: white;
}
 
.result-close-btn:hover {
transform: scale(1.05);
}
 
.home-page {
display: block;
}
 
.home-page.hidden {
display: none;
}
 
@media (max-width: 1024px) {
.hero {
flex-direction: column;
text-align: center;
padding: 60px 30px;
}
 
.hero-avatar {
width: 200px;
height: 200px;
}
 
.hero-avatar-inner {
font-size: 4rem;
}
 
.hero-name {
font-size: 2.5rem;
}
 
.hero-tags {
justify-content: center;
}
 
.course-grid {
padding: 0 30px 60px;
}
 
.nav {
padding: 0 30px;
}
 
.section-title {
padding: 0 30px;
}
}
 
@media (max-width: 768px) {
.course-grid {
grid-template-columns: 1fr;
}
 
.course-detail {
padding: 30px;
}
 
.course-header {
flex-direction: column;
text-align: center;
}
}
</style>
</head>
<body>
<div class="noise-overlay"></div>
 
<nav class="nav">
<div class="nav-logo" onclick="navigateTo('home')">陈嫣然</div>
<div class="nav-links">
<a class="nav-link" onclick="navigateTo('home')">首页</a>
<a class="nav-link" href="#home">课程</a>
<a class="nav-link" href="#home">关于</a>
</div>
</nav>
 
<main class="main">
<div id="home-page" class="home-page">
<section class="hero">
<div class="hero-avatar">
<div class="hero-avatar-inner">
<i data-lucide="user"></i>
</div>
</div>
<div class="hero-content">
<p class="hero-greeting">HELLO, WELCOME</p>
<h1 class="hero-name">陈嫣然</h1>
<div class="hero-info">
<p><span>广东科学技术职业学院</span> - 商学院</p>
<p>商务数据分析与应用专业</p>
</div>
<div class="hero-tags">
<span class="hero-tag">Python</span>
<span class="hero-tag">数据分析</span>
<span class="hero-tag">数据可视化</span>
<span class="hero-tag">数据库</span>
<span class="hero-tag">机器学习</span>
</div>
</div>
</section>
 
<section>
<div class="section-title">
<h2>我的课程</h2>
</div>
<div class="course-grid" id="course-grid"></div>
</section>
</div>
 
<div id="course-detail" class="course-detail"></div>
</main>
 
<div id="result-modal" class="result-modal">
<div class="result-content">
<div id="result-icon" class="result-icon"></div>
<h2 id="result-title" class="result-title"></h2>
<div id="result-score" class="result-score"></div>
<p id="result-detail" class="result-detail"></p>
<div class="result-actions">
<button class="result-btn result-retry-btn" onclick="retryExercise()">重新练习</button>
<button class="result-btn result-close-btn" onclick="closeResultModal()">关闭</button>
</div>
</div>
</div>
 
<script>
const courses = [
{ id: 1, name: 'Python基础', description: '学习Python编程语言的基础语法、数据类型、控制结构和函数等核心概念。', icon: 'code-2', color: '#3498db', color2: '#2980b9' },
{ id: 2, name: '数据分析技术', description: '掌握数据分析的基本方法、统计理论和数据处理技术。', icon: 'bar-chart-3', color: '#9b59b6', color2: '#8e44ad' },
{ id: 3, name: '数据采集与处理', description: '学习网络爬虫、数据清洗、转换和存储的技术与实践。', icon: 'database', color: '#2ecc71', color2: '#27ae60' },
{ id: 4, name: '供应链数据分析', description: '运用数据分析技术优化供应链管理、库存控制和物流配送。', icon: 'truck', color: '#e67e22', color2: '#d35400' },
{ id: 5, name: '数据库原理与应用', description: '理解关系型数据库设计原理，掌握SQL查询和数据库管理。', icon: 'server', color: '#1abc9c', color2: '#16a085' },
{ id: 6, name: 'Excel数据处理与分析', description: '利用Excel进行数据整理、公式计算、数据透视表和图表制作。', icon: 'table', color: '#34495e', color2: '#2c3e50' },

function generateChapters(courseId) {
const chapterTemplates = {
1: { title: 'Python概述与环境搭建', knowledgePoints: ['Python语言简介', 'Anaconda发行版安装', 'Jupyter Notebook使用', '第一个Python程序', 'IDE选择与配置'] },
2: { title: '变量与数据类型', knowledgePoints: ['变量命名规则', '基本数据类型', '类型转换', '常量定义', '变量的内存管理'] },
3: { title: '运算符与表达式', knowledgePoints: ['算术运算符', '比较运算符', '逻辑运算符', '赋值运算符', '运算符优先级'] },
4: { title: '条件语句', knowledgePoints: ['if语句基础', 'if-else结构', 'if-elif-else多分支', '嵌套条件', '三元表达式'] },
5: { title: '循环结构', knowledgePoints: ['for循环', 'while循环', 'break语句', 'continue语句', 'range函数'] },
6: { title: '字符串操作', knowledgePoints: ['字符串创建', '字符串索引', '字符串切片', '字符串方法', '格式化字符串'] },
7: { title: '列表与元组', knowledgePoints: ['列表创建与访问', '列表操作', '列表方法', '元组定义', '列表与元组区别'] },
8: { title: '字典与集合', knowledgePoints: ['字典创建', '字典访问', '字典操作', '集合创建', '集合运算'] },
9: { title: '函数基础', knowledgePoints: ['函数定义', '参数传递', '返回值', '默认参数', 'lambda函数'] },
10: { title: '文件操作', knowledgePoints: ['打开文件', '读取文件', '写入文件', '文件关闭', '上下文管理器'] }
};
return Object.keys(chapterTemplates).map(id => {
const base = chapterTemplates[id];
const exerciseSets = getExerciseSet(courseId, parseInt(id));
return {
id: parseInt(id),
title: base.title,
knowledgePoints: base.knowledgePoints,
exercises: exerciseSets
};
});
}

}
 
courses.forEach(course => {
course.chapters = generateChapters(course.id);
});
 
let currentCourse = null;
let currentChapter = null;
let currentQuestion = 0;
let userAnswers = {};
let quizActive = false;
 
function init() {
lucide.createIcons();
renderCourseGrid();
handleRoute();
window.addEventListener('hashchange', handleRoute);
}
 
function renderCourseGrid() {
const grid = document.getElementById('course-grid');
grid.innerHTML = courses.map(course => `
<div class="course-card" style="--card-color: ${course.color}; --card-color2: ${course.color2}; --card-glow: ${course.color}40;" onclick="navigateToCourse(${course.id})">
<div class="course-card-icon">
<i data-lucide="${course.icon}"></i>
</div>
<h3>${course.name}</h3>
<p>${course.description}</p>
<div class="course-card-meta">
<span><i data-lucide="book-open" style="width:16px;height:16px"></i> 10章节</span>
<span><i data-lucide="file-text" style="width:16px;height:16px"></i> 40+练习题</span>
</div>
</div>
`).join('');
lucide.createIcons();
}
 
function navigateTo(page) {
if (page === 'home') {
window.location.hash = '';
}
}
 
function navigateToCourse(courseId) {
window.location.hash = `course/${courseId}`;
}
 
function handleRoute() {
const hash = window.location.hash || '#home';
const parts = hash.replace('#', '').split('/');
document.getElementById('home-page').classList.add('hidden');
document.getElementById('course-detail').classList.remove('active');
if (parts[0] === 'course' && parts[1]) {
const courseId = parseInt(parts[1]);
currentCourse = courses.find(c => c.id === courseId);
if (currentCourse) {
renderCourseDetail(currentCourse);
}
} else {
document.getElementById('home-page').classList.remove('hidden');
}
}
 
function renderCourseDetail(course) {
const detail = document.getElementById('course-detail');
detail.innerHTML = `
<div class="back-btn" onclick="navigateTo('home')">
<i data-lucide="arrow-left" style="width:20px;height:20px"></i>
返回课程列表
</div>
<div class="course-header" style="--card-color: ${course.color}; --card-color2: ${course.color2};">
<div class="course-header-icon">
<i data-lucide="${course.icon}"></i>
</div>
<div>
<h1>${course.name}</h1>
<p>${course.description}</p>
</div>
</div>
<div class="chapter-list">
${course.chapters.map(chapter => `
<div class="chapter-item" id="chapter-${chapter.id}">
<div class="chapter-header" onclick="toggleChapter(${chapter.id})">
<div class="chapter-header-left">
<div class="chapter-number">${chapter.id}</div>
<div class="chapter-title">${chapter.title}</div>
</div>
<i data-lucide="chevron-down" class="chapter-arrow" style="width:20px;height:20px"></i>
</div>
<div class="chapter-content">
<div class="knowledge-section">
<h4><i data-lucide="book-marked" style="width:20px;height:20px"></i> 知识点</h4>
<div class="knowledge-grid">
${chapter.knowledgePoints.map(kp => `
<div class="knowledge-point">${kp}</div>
`).join('')}
</div>
</div>
<div class="exercise-section">
<div class="exercise-header">
<h4><i data-lucide="pencil" style="width:20px;height:20px"></i> 章节练习</h4>
</div>
<p class="exercise-intro">本章节包含 <span>${chapter.exercises.length}</span> 道练习题，涵盖本章核心知识点。</p>
<button class="start-exercise-btn" onclick="startExercise(${course.id}, ${chapter.id})">开始练习</button>
<div class="quiz-section" id="quiz-${course.id}-${chapter.id}"></div>
</div>
</div>
</div>
`).join('')}
</div>
`;
detail.classList.add('active');
lucide.createIcons();
}
 
function toggleChapter(chapterId) {
const chapterEl = document.getElementById(`chapter-${chapterId}`);
chapterEl.classList.toggle('expanded');
}
 
function startExercise(courseId, chapterId) {
const course = courses.find(c => c.id === courseId);
const chapter = course.chapters.find(ch => ch.id === chapterId);
currentCourse = course;
currentChapter = chapter;
currentQuestion = 0;
userAnswers = {};
quizActive = true;
const quizSection = document.getElementById(`quiz-${courseId}-${chapterId}`);
quizSection.classList.add('active');
renderQuestion();
}
 
function renderQuestion() {
const quizSection = document.getElementById(`quiz-${currentCourse.id}-${currentChapter.id}`);
const question = currentChapter.exercises[currentQuestion];
const progress = ((currentQuestion + 1) / currentChapter.exercises.length) * 100;
let optionsHtml = '';
if (question.type === 'fill') {
optionsHtml = `<input type="text" class="quiz-input" id="quiz-input" placeholder="请输入答案" value="${userAnswers[currentQuestion] || ''}">`;
} else {
const markers = ['A', 'B', 'C', 'D'];
optionsHtml = question.options.map((opt, idx) => `
<div class="quiz-option ${userAnswers[currentQuestion] === idx ? 'selected' : ''}" onclick="selectOption(${idx})">
<div class="quiz-option-marker">${markers[idx]}</div>
<div class="quiz-option-text">${opt}</div>
</div>
`).join('');
}
const typeLabel = { choice: '单选题', boolean: '判断题', fill: '填空题' };
quizSection.innerHTML = `
<div class="quiz-progress">
<div class="quiz-progress-bar">
<div class="quiz-progress-fill" style="width: ${progress}%"></div>
</div>
<div class="quiz-progress-text">${currentQuestion + 1}/${currentChapter.exercises.length}</div>
</div>
<div class="quiz-question">
<span class="quiz-question-type">${typeLabel[question.type]}</span>
<p class="quiz-question-text">${question.question}</p>
<div class="quiz-options">${optionsHtml}</div>
</div>
<div class="quiz-nav">
${currentQuestion > 0 ? '<button class="quiz-nav-btn quiz-prev-btn" onclick="prevQuestion()">上一题</button>' : '<div></div>'}
${currentQuestion < currentChapter.exercises.length - 1 ? 
'<button class="quiz-nav-btn quiz-next-btn" onclick="nextQuestion()">下一题</button>' : 
'<button class="quiz-nav-btn quiz-submit-btn" onclick="submitQuiz()">提交答案</button>'}
</div>
`;
if (question.type === 'fill') {
setTimeout(() => {
document.getElementById('quiz-input').focus();
}, 100);
}
}
 
function selectOption(idx) {
userAnswers[currentQuestion] = idx;
renderQuestion();
}
 
function nextQuestion() {
if (currentChapter.exercises[currentQuestion].type === 'fill') {
const input = document.getElementById('quiz-input');
userAnswers[currentQuestion] = input.value.trim();
}
currentQuestion++;
renderQuestion();
}
 
function prevQuestion() {
if (currentChapter.exercises[currentQuestion].type === 'fill') {
const input = document.getElementById('quiz-input');
userAnswers[currentQuestion] = input.value.trim();
}
currentQuestion--;
renderQuestion();
}
 
function submitQuiz() {
if (currentChapter.exercises[currentQuestion].type === 'fill') {
const input = document.getElementById('quiz-input');
userAnswers[currentQuestion] = input.value.trim();
}
let correct = 0;
currentChapter.exercises.forEach((q, idx) => {
if (q.type === 'fill') {
if (userAnswers[idx] && userAnswers[idx].toLowerCase().includes(q.answer.toLowerCase())) {
correct++;
}
} else if (userAnswers[idx] === q.answer) {
correct++;
}
});
const score = Math.round((correct / currentChapter.exercises.length) * 100);
showResult(score, correct);
}
 
function showResult(score, correct) {
const modal = document.getElementById('result-modal');
const icon = document.getElementById('result-icon');
const title = document.getElementById('result-title');
const scoreEl = document.getElementById('result-score');
const detail = document.getElementById('result-detail');
icon.className = 'result-icon';
if (score >= 90) {
icon.classList.add('excellent');
icon.innerHTML = '<i data-lucide="trophy" style="width:50px;height:50px;color:white"></i>';
title.textContent = '优秀!';
} else if (score >= 70) {
icon.classList.add('good');
icon.innerHTML = '<i data-lucide="thumbs-up" style="width:50px;height:50px;color:white"></i>';
title.textContent = '良好!';
} else if (score >= 60) {
icon.classList.add('pass');
icon.innerHTML = '<i data-lucide="check-circle" style="width:50px;height:50px;color:white"></i>';
title.textContent = '及格';
} else {
icon.classList.add('pass');
icon.innerHTML = '<i data-lucide="book-open" style="width:50px;height:50px;color:white"></i>';
title.textContent = '继续努力';
}
scoreEl.innerHTML = `${score}<span>%</span>`;
detail.textContent = `答对 ${correct}/${currentChapter.exercises.length} 题，继续加油！`;
modal.classList.add('active');
lucide.createIcons();
}
 
function closeResultModal() {
document.getElementById('result-modal').classList.remove('active');
quizActive = false;
}
 
function retryExercise() {
closeResultModal();
startExercise(currentCourse.id, currentChapter.id);
}
 
init();
</script>

</html>
